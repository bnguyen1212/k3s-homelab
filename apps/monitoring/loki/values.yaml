deploymentMode: SingleBinary

singleBinary:
  extraEnvFrom:
    - secretRef:
        name: loki-minio-secret
  extraArgs:
    - "-config.expand-env=true"
  replicas: 1

backend:
 replicas: 0

read:
 replicas: 0

write:
 replicas: 0

chunksCache:
  enabled: false

resultsCache:
  enabled: false

test:
  enabled: false

lokiCanary:
  enabled: false

loki:
  limits_config:
    retention_period: 30d
  compactor:
    retention_enabled: true 
    delete_request_store: filesystem
  auth_enabled: false
  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h

  storage:
    type: s3

    bucketNames:
      chunks: loki
      ruler: loki
      admin: loki

    s3:
      endpoint: minio.storage.svc.cluster.local:9000
      insecure: true
      s3ForcePathStyle: true

      accessKeyId: "${AWS_ACCESS_KEY_ID}"
      secretAccessKey: "${AWS_SECRET_ACCESS_KEY}"
